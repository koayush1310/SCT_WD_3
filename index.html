<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe Pro</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="container">

    <!-- Header -->

    <div class="header">
        <h1>Tic-Tac-Toe</h1>
        <p>SkillCraft Technology - Task 03</p>
    </div>

    <!-- Game Mode -->

    <div class="game-mode">

        <button id="pvp-btn" class="mode-btn active">
            👥 Player vs Player
        </button>

        <button id="ai-btn" class="mode-btn">
            🤖 Player vs Computer
        </button>

    </div>

    <!-- Scoreboard -->

    <div class="scoreboard">

        <div class="score-card">
            <h3>X</h3>
            <span id="x-score">0</span>
        </div>

        <div class="score-card">
            <h3>Draws</h3>
            <span id="draw-score">0</span>
        </div>

        <div class="score-card">
            <h3>O</h3>
            <span id="o-score">0</span>
        </div>

    </div>

    <!-- Status -->

    <div class="status">
        <h2 id="status-text">
            Player X's Turn
        </h2>
    </div>

    <!-- Game Board -->

    <div class="board">

        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>

        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>

        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>

    </div>

    <!-- Controls -->

    <div class="controls">

        <button id="restart-btn">
            🔄 Restart Game
        </button>

        <button id="reset-score-btn">
            🗑 Reset Scores
        </button>

    </div>

    <!-- Winner Modal -->

    <div id="winner-modal" class="modal">

        <div class="modal-content">

            <h2 id="winner-message">
                Player X Wins! 🎉
            </h2>

            <button id="play-again-btn">
                Play Again
            </button>

        </div>

    </div>

    <!-- Footer -->

    <footer>
        <p>
            Task 03 - Tic-Tac-Toe Web Application |
            SkillCraft Technology Internship
        </p>
    </footer>

</div>

<!-- Audio Effects -->

<audio id="move-sound" preload="auto">
    <source src="./audio/click.wav" type="audio/mpeg">
</audio>

<audio id="win-sound" preload="auto">
    <source src="./audio/win.wav" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>
</html>
